name: Generate Report from Issue

on:
  issues:
    types: [opened]

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Extract dates from issue
        id: extract_dates
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue?.body || "";
            const fromMatch = body.match(/^From:\s*(\d{4}-\d{2})$/m);
            const toMatch = body.match(/^To:\s*(\d{4}-\d{2})$/m);

            if (!fromMatch || !toMatch) {
              core.setFailed("Missing or invalid From/To values. Expected format: YYYY-MM.");
              return;
            }

            core.setOutput("from_month", fromMatch[1]);
            core.setOutput("to_month", toMatch[1]);

      - name: Check if dates are present
        run: |
          if [[ -z "${{ steps.extract_dates.outputs.from_month }}" || -z "${{ steps.extract_dates.outputs.to_month }}" ]]; then
            echo "Chybi data (From nebo To)"
            exit 1
          fi

      - name: Generate Custom Report
        env:
          FROM_MONTH: ${{ steps.extract_dates.outputs.from_month }}
          TO_MONTH: ${{ steps.extract_dates.outputs.to_month }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_custom_report.py "$FROM_MONTH" "$TO_MONTH"

      - name: Generate index.html with links to all reports
        run: python scripts/generate_index_page.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add summaries/ reports/ index.html
          git diff --cached --quiet || git commit -m "Auto update reports"
          git push

      - name: Close the issue
        if: success()
        run: |
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PERSONAL_ACCESS_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }} \
            -d '{"state": "closed"}'
